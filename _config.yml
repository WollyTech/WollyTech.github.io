# Site settings
title: "Olawole Abayomi-Owodunni - Portfolio"
description: "Game design and development portfolio"
url: "https://WollyTech.github.io"
baseurl: ""

# Author
author:
  name: "Olawole Abayomi-Owodunni"
  github: "WollyTech"

# Build settings
markdown: kramdown
permalink: pretty

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

# Plugins (GitHub Pages supports these by default)
plugins:
  - jekyll-relative-links
  - jekyll-optional-front-matter

# GitHub Pages settings
github: [metadata]
